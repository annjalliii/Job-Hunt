const calcScore = (job) => {
  let s = 0;
  const ps = PROFILE_SKILLS.map(x=>x.toLowerCase());
  const js = (job.skills||[]).map(x=>x.toLowerCase());
  const overlap = js.filter(j=>ps.some(p=>j.includes(p)||p.includes(j))).length;
  s += Math.min(40,(overlap/Math.max(js.length,1))*40);
  if (job.location?.toLowerCase().includes("london")) s+=25;
  else if (job.location?.toLowerCase().includes("remote")) s+=15;
  else s+=5;
  s += job.cat==="Data"?15:12;
  // Bonus for roles matching Anjali's business dev + finance background
  const bizTerms=["business","market","strategy","finance","investment","marketing","commercial"];
  if (bizTerms.some(b=>(job.title+" "+js.join(" ")).toLowerCase().includes(b))) s+=15;
  return Math.min(100,Math.round(s));
};

    if(q&&!(j.title+" "+j.company).toLowerCase().includes(q.toLowerCase()))return false;
    if(filter==="data")return j.cat==="Data";
    if(filter==="consulting")return j.cat==="Consulting";
    if(filter==="london")return j.location?.toLowerCase().includes("london");
    if(filter==="todo")return["Not Started","Interested"].includes(j.status);
    if(filter==="applied")return["Applied","Interview","Offer"].includes(j.status);
    if(filter==="followup"){if(j.status!=="Applied"||!j.appliedDate)return false;return Math.floor((Date.now()-new Date(j.appliedDate).getTime())/86400000)>=7&&!j.followUp}
    return true;
  });

  const cnt={total:jobs.length,applied:jobs.filter(j=>j.status==="Applied").length,interview:jobs.filter(j=>j.status==="Interview").length,todo:jobs.filter(j=>["Not Started","Interested"].includes(j.status)).length,followup:jobs.filter(j=>{if(j.status!=="Applied"||!j.appliedDate)return false;return Math.floor((Date.now()-new Date(j.appliedDate).getTime())/86400000)>=7&&!j.followUp}).length};
  const daysSince=(d)=>d?Math.floor((Date.now()-new Date(d).getTime())/86400000):0;

  return (
    <div>
      {/* HEADER */}
      <div style={{padding:"12px 20px",borderBottom:"1px solid rgba(255,255,255,0.06)",background:"rgba(11,15,25,0.92)",backdropFilter:"blur(12px)",position:"sticky",top:0,zIndex:50}}>
        <div style={{maxWidth:880,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{fontSize:17,fontWeight:700}}><span style={{color:"#3b82f6"}}>●</span> JobHunt</div>
            <div style={{display:"flex",gap:2}}>
              {[{k:"jobs",l:"Jobs"},{k:"quickfill",l:"⚡ Quick Fill"},{k:"answers",l:"💬 Answers"}].map(n=>(
                <button key={n.k} onClick={()=>setPage(n.k)} className="nav-btn"
                  style={{background:page===n.k?"rgba(59,130,246,0.12)":"transparent",color:page===n.k?"#60a5fa":"#64748b",fontSize:12,padding:"6px 12px"}}>{n.l}</button>
              ))}
            </div>
          </div>
          <div style={{display:"flex",gap:14,fontSize:12}}>
            <span style={{color:"#475569"}}>Todo <b style={{color:"#60a5fa"}}>{cnt.todo}</b></span>
            <span style={{color:"#475569"}}>Applied <b style={{color:"#fbbf24"}}>{cnt.applied}</b></span>
            {cnt.followup>0&&<span style={{color:"#475569"}}>Follow up <b style={{color:"#f97316"}}>{cnt.followup}</b></span>}
            <span style={{color:"#475569"}}>Interviews <b style={{color:"#a78bfa"}}>{cnt.interview}</b></span>
          </div>
        </div>
      </div>

      <div style={{maxWidth:880,margin:"0 auto",padding:"20px 20px 60px"}}>

      {/* ════ JOBS ════ */}
      {page==="jobs"&&(<div>
        <div className="fu" style={{marginBottom:20}}>
          <div style={{fontSize:11,fontWeight:600,color:"#475569",textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:8}}>Find new roles →</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {SEARCHES.map((s,i)=>(<a key={i} href={s.u} target="_blank" rel="noopener noreferrer" className="pill"><span style={{width:5,height:5,borderRadius:"50%",background:s.c}}/><span style={{color:"#64748b",fontSize:10}}>{s.p}</span>{s.l}<Arr/></a>))}
          </div>
        </div>

        <div className="fu" style={{animationDelay:"0.04s",display:"flex",gap:6,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
          <div style={{position:"relative",flex:1,minWidth:180}}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#475569" strokeWidth="2" style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)"}}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search..." style={{width:"100%",padding:"8px 10px 8px 32px",background:"#141b2d",border:"1px solid rgba(255,255,255,0.06)",borderRadius:8,color:"#e2e8f0",fontSize:13,outline:"none"}} onFocus={e=>e.target.style.borderColor="#3b82f6"} onBlur={e=>e.target.style.borderColor="rgba(255,255,255,0.06)"}/>
          </div>
          {[{k:"all",l:"All "+cnt.total},{k:"todo",l:"Todo "+cnt.todo},{k:"data",l:"Data"},{k:"consulting",l:"Consulting"},{k:"london",l:"London"},{k:"applied",l:"Applied+"},{k:"followup",l:"⏰ Follow up"+(cnt.followup>0?" "+cnt.followup:"")}].map(f=>(
            <button key={f.k} onClick={()=>setFilter(f.k)} className="fbtn"
              style={{border:filter===f.k?"1px solid rgba(59,130,246,0.4)":"1px solid rgba(255,255,255,0.06)",background:filter===f.k?"rgba(59,130,246,0.1)":"transparent",color:filter===f.k?"#60a5fa":f.k==="followup"&&cnt.followup>0?"#f97316":"#64748b"}}>{f.l}</button>
          ))}
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {filtered.map((job,i)=>{
            const sc=job.matchScore,scC=sc>=75?"#22c55e":sc>=50?"#eab308":"#ef4444",st=ST[job.status],days=daysSince(job.appliedDate),needsFU=job.status==="Applied"&&days>=7&&!job.followUp;
            return(
              <div key={job.id} className="jc fu" style={{animationDelay:(.02*i)+"s",borderColor:needsFU?"rgba(249,115,22,0.3)":"rgba(255,255,255,0.06)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                      <span style={{fontSize:14,fontWeight:600}}>{job.title}</span>
                      <span style={{fontSize:11,fontWeight:700,color:scC,background:scC+"15",padding:"2px 8px",borderRadius:10}}>{sc}%</span>
                      {needsFU&&<span style={{fontSize:10,fontWeight:600,color:"#f97316",background:"rgba(249,115,22,0.12)",padding:"2px 8px",borderRadius:10}}>⏰ Follow up ({days}d)</span>}
                      {job.followUp&&<span style={{fontSize:10,color:"#4ade80"}}>✓ Followed up</span>}
                    </div>
                    <div style={{fontSize:12,color:"#3b82f6",fontWeight:500,marginTop:1}}>{job.company}</div>
                    <div style={{display:"flex",gap:10,fontSize:11,color:"#475569",marginTop:4,flexWrap:"wrap"}}><span style={{display:"flex",alignItems:"center",gap:2}}><Pin/>{job.location}</span><span>{job.salary}</span>{job.appliedDate&&<span>Applied {job.appliedDate}</span>}</div>
                    <div style={{fontSize:11,color:"#6b7a8d",marginTop:4,fontStyle:"italic"}}>💡 {job.why}</div>
                    <div style={{display:"flex",gap:3,flexWrap:"wrap",marginTop:5}}>
                      {(job.skills||[]).map((s,si)=>{const m=PROFILE_SKILLS.some(p=>p.toLowerCase()===s.toLowerCase());return<span key={si} style={{fontSize:9,padding:"1px 6px",borderRadius:3,background:m?"rgba(34,197,94,0.1)":"rgba(255,255,255,0.03)",color:m?"#4ade80":"#4b5563",fontWeight:m?600:400}}>{m?"✓ ":""}{s}</span>})}
                    </div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5,flexShrink:0}}>
                    <select value={job.status} onChange={e=>{e.target.value==="Applied"?markApplied(job.id):upJob(job.id,{status:e.target.value})}} style={{background:st.bg,color:st.fg,border:"none",borderRadius:5,padding:"3px 6px",fontSize:10,fontWeight:600,cursor:"pointer",outline:"none",fontFamily:"inherit"}}>{STATUS.map(s=><option key={s} value={s}>{s}</option>)}</select>
                    <div style={{display:"flex",gap:4}}><a href={job.url} target="_blank" rel="noopener noreferrer" className="abtn">Apply <Arr/></a><button onClick={()=>genCL(job)} className="sbtn">CL</button></div>
                    {needsFU&&<button onClick={()=>upJob(job.id,{followUp:true})} className="sbtn" style={{fontSize:10,color:"#f97316",borderColor:"rgba(249,115,22,0.3)"}}>✓ Followed up</button>}
                  </div>
                </div>
              </div>
            );
          })}
          {filtered.length===0&&<div style={{textAlign:"center",padding:40,color:"#475569",fontSize:13}}>No jobs match this filter</div>}
        </div>
      </div>)}

      {/* ════ QUICK FILL ════ */}
      {page==="quickfill"&&(<div className="fu">
        <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>⚡ Quick Fill</div>
        <div style={{fontSize:13,color:"#64748b",marginBottom:20}}>Click "Copy" next to any field to paste into application forms. Edit to update.</div>
        <div className="section">
          <div style={{fontSize:13,fontWeight:600,color:"#60a5fa",marginBottom:12}}>Personal Details</div>
          {[{k:"name",l:"Full Name"},{k:"email",l:"Email"},{k:"phone",l:"Phone"},{k:"linkedin",l:"LinkedIn URL"}].map(f=>(
            <div className="field-row" key={f.k}><div style={{flex:1}}><div style={{fontSize:11,color:"#475569",marginBottom:2}}>{f.l}</div><input value={profile[f.k]} onChange={e=>upProfile(f.k,e.target.value)} placeholder={`Enter ${f.l.toLowerCase()}...`} style={{width:"100%",background:"transparent",border:"none",color:"#e2e8f0",fontSize:13,outline:"none",fontFamily:"inherit"}}/></div><CopyBtn text={profile[f.k]}/></div>
          ))}
        </div>
        <div className="section">
          <div style={{fontSize:13,fontWeight:600,color:"#60a5fa",marginBottom:12}}>Education & Skills</div>
          {[{k:"degree",l:"Degree"},{k:"university",l:"University"},{k:"gradYear",l:"Graduation Year"},{k:"skills",l:"Skills"},{k:"languages",l:"Languages"}].map(f=>(
            <div className="field-row" key={f.k}><div style={{flex:1}}><div style={{fontSize:11,color:"#475569",marginBottom:2}}>{f.l}</div><input value={profile[f.k]} onChange={e=>upProfile(f.k,e.target.value)} style={{width:"100%",background:"transparent",border:"none",color:"#e2e8f0",fontSize:13,outline:"none",fontFamily:"inherit"}}/></div><CopyBtn text={profile[f.k]}/></div>
          ))}
        </div>
        <div className="section">
          <div style={{fontSize:13,fontWeight:600,color:"#60a5fa",marginBottom:12}}>Common Fields</div>
          {[{k:"rightToWork",l:"Right to Work"},{k:"noticePeriod",l:"Availability"},{k:"salaryExpectation",l:"Salary Expectation"}].map(f=>(
            <div className="field-row" key={f.k}><div style={{flex:1}}><div style={{fontSize:11,color:"#475569",marginBottom:2}}>{f.l}</div><input value={profile[f.k]} onChange={e=>upProfile(f.k,e.target.value)} style={{width:"100%",background:"transparent",border:"none",color:"#e2e8f0",fontSize:13,outline:"none",fontFamily:"inherit"}}/></div><CopyBtn text={profile[f.k]}/></div>
          ))}
        </div>
        <div className="section">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><div style={{fontSize:13,fontWeight:600,color:"#60a5fa"}}>About Me / Bio</div><CopyBtn text={profile.bio} label="Copy bio"/></div>
          <textarea value={profile.bio} onChange={e=>upProfile("bio",e.target.value)} rows={5} style={{width:"100%",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:8,padding:12,color:"#e2e8f0",fontSize:12,lineHeight:1.6,outline:"none",resize:"vertical",fontFamily:"inherit"}}/>
        </div>
      </div>)}

      {/* ════ ANSWERS ════ */}
      {page==="answers"&&(<div className="fu">
        <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>💬 Screening Answers</div>
        <div style={{fontSize:13,color:"#64748b",marginBottom:20}}>Pre-written answers for common questions. Edit them, then copy-paste. Replace [Company] and [specific area] with real details.</div>
        {answers.map((a,i)=>(
          <div className="section" key={i}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,marginBottom:8}}><div style={{fontSize:13,fontWeight:600,color:"#e2e8f0"}}>{a.q}</div><CopyBtn text={a.a}/></div>
            <textarea value={a.a} onChange={e=>{const n=[...answers];n[i]={...n[i],a:e.target.value};setAnswers(n)}} rows={4} style={{width:"100%",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:8,padding:10,color:"#cbd5e1",fontSize:12,lineHeight:1.6,outline:"none",resize:"vertical",fontFamily:"inherit"}}/>
          </div>
        ))}
      </div>)}

      </div>

      {/* COVER LETTER MODAL */}
      {clJob&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(6px)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>{setClJob(null);setClText("")}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#141b2d",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,maxWidth:560,width:"100%",maxHeight:"80vh",overflowY:"auto",padding:22}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}>
              <div><div style={{fontSize:15,fontWeight:700}}>Cover Letter</div><div style={{fontSize:12,color:"#475569",marginTop:1}}>{clJob.title} · {clJob.company}</div></div>
              <button onClick={()=>{setClJob(null);setClText("")}} style={{background:"none",border:"none",color:"#475569",fontSize:18,cursor:"pointer",fontFamily:"inherit"}}>✕</button>
            </div>
            {clLoading?(<div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"40px 0",color:"#3b82f6",fontSize:13}}><div style={{width:14,height:14,border:"2px solid #3b82f6",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>Writing your cover letter...</div>
            ):(<>
              <div style={{background:"#0b0f19",border:"1px solid rgba(255,255,255,0.05)",borderRadius:8,padding:16,fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap",minHeight:160}}>{clText||fallbackCL(clJob)}</div>
              <div style={{display:"flex",gap:6,marginTop:12}}><CopyBtn text={clText||fallbackCL(clJob)} label="Copy"/><button onClick={()=>genCL(clJob)} className="abtn" style={{fontSize:11}}>{clText?"↻ Redo":"✦ AI Generate"}</button></div>
            </>)}
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
