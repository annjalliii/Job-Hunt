const calcScore = (job) => {
  let s = 0;
  const ps = PROFILE.skills.map(x => x.toLowerCase());
  const js = (job.skills||[]).map(x => x.toLowerCase());
  const overlap = js.filter(j => ps.some(p => j.includes(p)||p.includes(j))).length;
  s += Math.min(40, (overlap/Math.max(js.length,1))*40);
  if (job.location?.toLowerCase().includes("london")) s += 25;
  else if (job.location?.toLowerCase().includes("remote")) s += 15;
  else s += 5;
  s += job.cat === "Data" ? 15 : 12;
  const cyber = ["cyber","security","soc","threat","splunk","crowdstrike"];
  if (cyber.some(c => (job.title+" "+js.join(" ")).toLowerCase().includes(c))) s += 20;
  return Math.min(100, Math.round(s));
};

const fallbackCL = (job) => `Dear Hiring Manager,

I am writing to apply for the ${job.title} position at ${job.company}. As an MSc Business Analytics student at UCL School of Management, I bring advanced analytical training combined with hands-on cybersecurity experience as a SOC Analyst at Macquarie.

function App() {

    const saved = localStorage.getItem("jobhunt_statuses");
    const statuses = saved ? JSON.parse(saved) : {};

      ...j,
      matchScore: calcScore(j),
      status: statuses[j.id] || "Not Started"

        })

      const d = await r.json();
      setClText(d.content?.map(c=>c.text||"").join("\n") || fallbackCL(job));

      <div style={{maxWidth:880,margin:"0 auto",padding:"20px 20px 60px"}}>

        {/* SEARCH PILLS */}

          <div style={{fontSize:11,fontWeight:600,color:"#475569",textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:8}}>Find new roles →</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>

                      {(job.skills||[]).map((s,si) => {
                        const m = PROFILE.skills.some(p => p.toLowerCase() === s.toLowerCase());
                        return <span key={si} style={{fontSize:9,padding:"1px 6px",borderRadius:3,background:m?"rgba(34,197,94,0.1)":"rgba(255,255,255,0.03)",color:m?"#4ade80":"#4b5563",fontWeight:m?600:400}}>{m?"✓ ":""}{s}</span>;
                      })}
                    </div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,flexShrink:0}}>
                    <select value={job.status} onChange={e=>update(job.id,e.target.value)}
                      style={{background:st.bg,color:st.fg,border:"none",borderRadius:5,padding:"3px 6px",fontSize:10,fontWeight:600,cursor:"pointer",outline:"none",fontFamily:"inherit"}}>
                      {STATUS.map(s=><option key={s} value={s}>{s}</option>)}
                    </select>
                    <div style={{display:"flex",gap:4}}>
                      <a href={job.url} target="_blank" rel="noopener noreferrer" className="apply-btn">Apply <Arrow /></a>
                      <button onClick={()=>genCL(job)} className="cl-btn">CL</button>
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
          {filtered.length===0 && <div style={{textAlign:"center",padding:40,color:"#475569",fontSize:13}}>No jobs match — try a different filter</div>}
        </div>
      </div>

      {/* COVER LETTER MODAL */}
      {clJob && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(6px)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}
          onClick={()=>{setClJob(null);setClText("")}}>
          <div onClick={e=>e.stopPropagation()}
            style={{background:"#141b2d",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,maxWidth:560,width:"100%",maxHeight:"80vh",overflowY:"auto",padding:22}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}>
              <div>
                <div style={{fontSize:15,fontWeight:700}}>Cover Letter</div>
                <div style={{fontSize:12,color:"#475569",marginTop:1}}>{clJob.title} · {clJob.company}</div>
              </div>
              <button onClick={()=>{setClJob(null);setClText("")}} style={{background:"none",border:"none",color:"#475569",fontSize:18,cursor:"pointer",fontFamily:"inherit"}}>✕</button>
            </div>
            {clLoading ? (
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"40px 0",color:"#3b82f6",fontSize:13}}>
                <div style={{width:14,height:14,border:"2px solid #3b82f6",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.7s linear infinite"}} />
                Writing your cover letter...
              </div>
            ) : (
              <>
                <div style={{background:"#0b0f19",border:"1px solid rgba(255,255,255,0.05)",borderRadius:8,padding:16,fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap",minHeight:160}}>
                  {clText || fallbackCL(clJob)}
                </div>
                <div style={{display:"flex",gap:6,marginTop:12}}>
                  <button onClick={()=>copy(clText||fallbackCL(clJob))}
                    style={{padding:"7px 14px",borderRadius:7,background:copied?"rgba(34,197,94,0.12)":"rgba(255,255,255,0.04)",border:"1px solid "+(copied?"rgba(34,197,94,0.3)":"rgba(255,255,255,0.06)"),color:copied?"#4ade80":"#94a3b8",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                    {copied ? "✓ Copied" : "Copy"}
                  </button>
                  <button onClick={()=>genCL(clJob)}
                    style={{padding:"7px 14px",borderRadius:7,background:"#3b82f6",border:"none",color:"#fff",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                    {clText ? "↻ Redo" : "✦ AI Generate"}
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
